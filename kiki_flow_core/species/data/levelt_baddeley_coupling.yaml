# Coupling matrix J[i,j] = strength of activation flow from species j to species i.
# References:
#   Levelt, W.J.M. (1989). Speaking: From Intention to Articulation. MIT Press.
#   Baddeley, A. (2000). The episodic buffer. Trends in Cognitive Sciences, 4(11), 417-423.
species_order: [phono, lex, syntax, sem]
coupling_matrix:
  # row = receiver, col = sender
  # phono receives from: lex (strong forward), itself (rehearsal), sem (weak)
  - [0.20, 0.50, 0.05, 0.05]
  # lex receives from: sem (spreading activation, strong), phono (feedback for repair), syntax
  - [0.30, 0.15, 0.20, 0.60]
  # syntax receives from: lex (lemma drives frame), itself
  - [0.00, 0.40, 0.20, 0.10]
  # sem receives mostly from itself + weak from lex
  - [0.00, 0.10, 0.00, 0.85]
