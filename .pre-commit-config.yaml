repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-PyYAML, numpy>=2.1]
        args: [--strict, --ignore-missing-imports]
        files: ^kiki_flow_core/
  - repo: local
    hooks:
      - id: pytest-collect
        name: pytest collect (smoke)
        entry: bash -c 'uv run pytest --collect-only --no-cov; rc=$?; [ $rc -eq 0 ] || [ $rc -eq 5 ]'
        language: system
        pass_filenames: false
        stages: [pre-commit]
